# SEO Optimizer — Nginx reverse proxy
#
# Kurulum (sunucuda):
#   sudo cp ~/app/deploy/nginx.conf /etc/nginx/sites-available/seo-optimizer
#   sudo ln -s /etc/nginx/sites-available/seo-optimizer /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (443) bloğunu Certbot otomatik ekler:
#   sudo certbot --nginx -d zenovaapp.com -d www.zenovaapp.com --redirect
#
# NOT: Bu uygulama SSE (Server-Sent Events) ile ~13 dakikaya kadar süren
# canlı akış yapar. Aşağıdaki proxy_buffering off + uzun timeout ayarları
# bu akışın kesilmemesi için KRİTİKTİR.

server {
    listen 80;
    listen [::]:80;
    server_name zenovaapp.com www.zenovaapp.com;

    # Büyük analiz isteklerini engellememek için
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- SSE / uzun istek ayarları (kritik) ---
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
        chunked_transfer_encoding off;
    }
}
